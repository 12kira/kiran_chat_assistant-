<!DOCTYPE html>
<html>

<head>
    <title>Kiran AI Assistant</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(-45deg, #4facfe, #6a11cb, #00c6ff, #8e54e9);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* 🔥 WATERMARK */
       body::before {
    content: "KIRAN CHAT ASSISTANT";
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-20deg);
    font-size: 80px;
    font-weight: bold;
    color: rgba(255, 255, 255, 0.07);
    pointer-events: none;
    z-index: 0;
    text-align: center;
    white-space: nowrap;
}

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .chat-container {
            width: 520px;
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .header span {
            font-size: 12px;
            opacity: 0.9;
        }

        .chat-box {
            height: 420px;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.4);
        }

        .message {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            border-radius: 12px;
            max-width: 75%;
            font-size: 14px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* USER */
        .user {
            background: #4facfe;
            color: white;
            align-self: flex-end;
            border-radius: 15px 15px 0 15px;
            padding: 10px 14px;
        }

        /* AI */
        .ai {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px 15px 15px 0;
        }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
        }

        .text {
            word-break: break-word;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: rgba(255, 255, 255, 0.3);
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            outline: none;
            border-radius: 10px;
        }

        button {
            margin-left: 8px;
            background: #4facfe;
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #3182f6;
        }
    </style>
</head>

<body>

    <div class="chat-container">

        <div class="header">
            <img src="/static/kiran.jpg" class="avatar" />
            <div>
                🤖 Kiran Ananthula AI Assistant
                <span>Smart conversations powered by AI</span>
            </div>
        </div>

        <div class="chat-box" id="chatBox">

            <div class="message ai">
                <img src="/static/kiran.jpg" class="msg-avatar" />
                <div class="text">😂 Hey! I’m Kiran AI — ask me anything, I won’t judge 😎</div>
            </div>

        </div>

        <div class="input-area">
            <input type="text" id="question" placeholder="Ask something..." />
            <button onclick="askAI()">Send</button>
        </div>

    </div>

    <script>

        const AI_AVATAR = "/static/kiran.jpg";

        const input = document.getElementById("question");

        input.addEventListener("keypress", function (e) {
            if (e.key === "Enter") {
                askAI();
            }
        });

        // 😂 FUN RESPONSES
        function makeFunny(text) {
            const funnyLines = [
                "😎 I got you bro!",
                "😂 Easy question for me!",
                "🤖 Let me flex my AI brain...",
                "🔥 Boom! Here's your answer:",
                "😜 Not gonna lie, this was fun!",
                "👀 Interesting question!"
            ];

            const random = funnyLines[Math.floor(Math.random() * funnyLines.length)];

            return `${random}<br><br>${text}`;
        }

        async function askAI() {

            const questionInput = document.getElementById("question");
            const chatBox = document.getElementById("chatBox");

            const question = questionInput.value;

            if (question.trim() === "") return;

            // USER MESSAGE
            const userMsg = document.createElement("div");
            userMsg.className = "message user";
            userMsg.innerHTML = `<div class="text">${question}</div>`;
            chatBox.appendChild(userMsg);

            questionInput.value = "";

            // LOADING TEXT
            const loadingTexts = [
                "🤖 Thinking...",
                "🧠 Using 100% brain...",
                "⚡ Generating magic...",
                "😎 Cooking answer..."
            ];

            const randomLoad = loadingTexts[Math.floor(Math.random() * loadingTexts.length)];

            const loading = document.createElement("div");
            loading.className = "message ai";
            loading.innerHTML = `
                <img src="${AI_AVATAR}" class="msg-avatar"/>
                <div class="text">${randomLoad}</div>
            `;
            chatBox.appendChild(loading);

            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ question })
                });

                const data = await res.json();

                loading.remove();

                // AI RESPONSE
                const aiMsg = document.createElement("div");
                aiMsg.className = "message ai";
                aiMsg.innerHTML = `
                    <img src="${AI_AVATAR}" class="msg-avatar"/>
                    <div class="text">${makeFunny(data.answer)}</div>
                `;

                chatBox.appendChild(aiMsg);
                chatBox.scrollTop = chatBox.scrollHeight;

            } catch (error) {
                loading.remove();

                const errorMsg = document.createElement("div");
                errorMsg.className = "message ai";
                errorMsg.innerHTML = `
                    <img src="${AI_AVATAR}" class="msg-avatar"/>
                    <div class="text">⚠️ Oops! Server went on a chai break ☕</div>
                `;

                chatBox.appendChild(errorMsg);
            }
        }

    </script>

</body>

</html>
